# Local development: only infrastructure (MySQL + Redis + MinIO)
# App runs locally via `npm run dev` for hot reload.
# Usage: docker compose -f docker-compose.local.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: waoowaoo-mysql
    restart: unless-stopped
    mem_limit: 2g
    memswap_limit: 2g
    cpus: 1.0
    environment:
      MYSQL_ROOT_PASSWORD: waoowaoo123
      MYSQL_DATABASE: waoowaoo
      MYSQL_ROOT_HOST: "%"
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - "--default-authentication-plugin=mysql_native_password"
      - "--sql_mode=STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -pwaoowaoo123"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: waoowaoo-redis
    restart: unless-stopped
    mem_limit: 1g
    memswap_limit: 1g
    cpus: 0.5
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: waoowaoo-minio
    restart: unless-stopped
    mem_limit: 1g
    memswap_limit: 1g
    cpus: 0.5
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

volumes:
  mysql_data:
  redis_data:
  minio_data:
